<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0.3" y2="0.3">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#shine)"/>

  <!-- Subtle inner shadow / depth -->
  <rect x="16" y="16" width="992" height="992" rx="220" ry="220" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="2"/>

  <!-- Microphone body -->
  <rect x="412" y="200" width="200" height="340" rx="100" ry="100" fill="white"/>

  <!-- Microphone grille lines -->
  <line x1="442" y1="310" x2="582" y2="310" stroke="rgba(79,70,229,0.3)" stroke-width="8" stroke-linecap="round"/>
  <line x1="442" y1="360" x2="582" y2="360" stroke="rgba(79,70,229,0.3)" stroke-width="8" stroke-linecap="round"/>
  <line x1="442" y1="410" x2="582" y2="410" stroke="rgba(79,70,229,0.3)" stroke-width="8" stroke-linecap="round"/>

  <!-- Microphone arc -->
  <path d="M 340 440 Q 340 600 512 600 Q 684 600 684 440"
        fill="none" stroke="white" stroke-width="36" stroke-linecap="round"/>

  <!-- Microphone stand -->
  <line x1="512" y1="600" x2="512" y2="690" stroke="white" stroke-width="36" stroke-linecap="round"/>

  <!-- Document/notes element (bottom right) -->
  <g transform="translate(560, 560)">
    <!-- Page background -->
    <rect x="0" y="0" width="260" height="300" rx="24" ry="24" fill="white"/>
    <!-- Dog-ear fold -->
    <path d="M 196 0 L 260 64 L 196 64 Z" fill="rgba(79,70,229,0.15)"/>
    <!-- Text lines -->
    <line x1="40" y1="100" x2="220" y2="100" stroke="rgba(79,70,229,0.35)" stroke-width="14" stroke-linecap="round"/>
    <line x1="40" y1="145" x2="200" y2="145" stroke="rgba(79,70,229,0.25)" stroke-width="14" stroke-linecap="round"/>
    <line x1="40" y1="190" x2="180" y2="190" stroke="rgba(79,70,229,0.25)" stroke-width="14" stroke-linecap="round"/>
    <line x1="40" y1="235" x2="160" y2="235" stroke="rgba(79,70,229,0.2)" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- Small sparkle/AI accent (top right of mic) -->
  <g transform="translate(660, 240)" fill="rgba(255,255,255,0.85)">
    <path d="M 0 -20 Q 5 -5 20 0 Q 5 5 0 20 Q -5 5 -20 0 Q -5 -5 0 -20 Z"/>
  </g>
  <g transform="translate(700, 300) scale(0.6)" fill="rgba(255,255,255,0.5)">
    <path d="M 0 -20 Q 5 -5 20 0 Q 5 5 0 20 Q -5 5 -20 0 Q -5 -5 0 -20 Z"/>
  </g>
</svg>
